<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interwheel — A* Playground</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; background: #0e1418; color: #c8d6dc; font-family: 'Trebuchet MS', sans-serif; }
      .wrap { --stage-shell-width: 324px; display: grid; grid-template-columns: var(--stage-shell-width) minmax(280px, 360px) minmax(280px, 380px); gap: 24px; padding: 24px; align-items: start; justify-content: start; }
      .wrap > * { min-width: 0; }
      .game-column { width: var(--stage-shell-width); max-width: 100%; }
      .stage { width: fit-content; max-width: 100%; overflow: auto; background: #1c2c34; padding: 12px; border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
      .stage canvas { display: block; image-rendering: pixelated; }
      .panel { line-height: 1.5; font-size: 14px; }
      .panel h1 { font-size: 18px; margin: 0 0 12px; color: #e1bd6a; letter-spacing: .04em; }
      .panel h2 { font-size: 13px; margin: 20px 0 12px; color: #d8e5e9; letter-spacing: .08em; text-transform: uppercase; }
      .panel kbd { background: #2a3a44; padding: 1px 6px; border-radius: 3px; font-family: monospace; font-size: 12px; }
      .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px 12px; max-width: 100%; margin-top: 12px; font-size: 12px; }
      .stat { min-width: 0; border-top: 1px solid rgba(200, 214, 220, .18); padding-top: 6px; }
      .stat-label { display: block; color: #78919b; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
      .stat-value { display: block; overflow: hidden; color: #edf6f8; font: 13px/1.35 monospace; text-overflow: ellipsis; white-space: nowrap; }
      .controls { display: grid; gap: 14px; margin-top: 8px; }
      .control { display: grid; grid-template-columns: 1fr auto; gap: 8px 12px; align-items: center; }
      .control label { color: #edf6f8; font-size: 13px; }
      .control output { min-width: 44px; font: 12px/1.2 monospace; color: #9fd5e2; text-align: right; }
      .control input { grid-column: 1 / -1; width: 100%; accent-color: #72c7d6; }
      .actions { display: flex; gap: 8px; margin-top: 14px; }
      .actions button { border: 1px solid #365866; background: #18282f; color: #dbecef; border-radius: 6px; padding: 7px 10px; font: inherit; cursor: pointer; }
      .actions button:hover { background: #20343d; }
      @media (max-width: 1100px) {
        .wrap { grid-template-columns: var(--stage-shell-width) minmax(280px, 1fr); }
      }
      @media (max-width: 760px) {
        .wrap { grid-template-columns: 1fr; padding: 12px; }
        .game-column { width: 100%; }
        .stage canvas { max-width: 100%; height: auto; }
        .panel { min-width: 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="game-column">
        <div class="stage" id="stage"></div>
        <div class="stats" id="stats"></div>
      </div>
      <div class="panel">
        <h1>Interwheel — A* agent</h1>
        <p>
          <kbd>D</kbd> toggle the candidate-line overlay.<br>
          <kbd>A</kbd> toggle the AI on/off (you can take over with <kbd>Space</kbd>).<br>
          <kbd>P</kbd> pause / resume.<br>
          <kbd>R</kbd> reload the page for a fresh level.
        </p>
        <div class="actions">
          <button id="game-pause" type="button">Pause</button>
        </div>
        <h2>Policy</h2>
        <div class="controls" id="policy-controls">
          <div class="control">
            <label for="policy-focus">Focus (climb ↔ collect)</label>
            <output id="policy-focus-value">0.33</output>
            <input id="policy-focus" type="range" min="0" max="1" step="0.01" value="0.33">
          </div>
          <div class="control">
            <label for="policy-wallRoutes">Wall routes</label>
            <output id="policy-wallRoutes-value">0.00</output>
            <input id="policy-wallRoutes" type="range" min="0" max="2" step="0.05" value="0" data-policy-key="wallRoutes">
          </div>
          <div class="control">
            <label for="policy-pace">Pace</label>
            <output id="policy-pace-value">1.00</output>
            <input id="policy-pace" type="range" min="0.5" max="1.8" step="0.05" value="1" data-policy-key="pace">
          </div>
        </div>
        <div class="actions">
          <button id="policy-reset" type="button">Reset</button>
        </div>
      </div>
      <div class="panel">
        <h2>Planner experiment</h2>
        <div class="controls" id="objective-controls">
          <div class="control" style="grid-template-columns: 1fr auto;">
            <label for="objective-asymmetricYGain">Asymmetric yGain (temporary)</label>
            <input id="objective-asymmetricYGain" type="checkbox" data-objective-flag="asymmetricYGain" style="grid-column: auto; width: auto;">
          </div>
        </div>
        <h2>Overlay</h2>
        <div class="controls" id="overlay-controls">
          <div class="control">
            <label for="overlay-lineageDecay">Lineage decay</label>
            <output id="overlay-lineageDecay-value">0.65</output>
            <input id="overlay-lineageDecay" type="range" min="0" max="0.95" step="0.05" value="0.65" data-overlay-key="lineageDecay">
          </div>
          <div class="control">
            <label for="overlay-lineageGamma">Lineage γ (descendant filter)</label>
            <output id="overlay-lineageGamma-value">3.0</output>
            <input id="overlay-lineageGamma" type="range" min="1" max="5" step="0.5" value="3" data-overlay-key="lineageGamma">
          </div>
          <div class="control" style="grid-template-columns: 1fr auto;">
            <label for="overlay-rawScoreSeed">Use raw score (instead of rank)</label>
            <input id="overlay-rawScoreSeed" type="checkbox" style="grid-column: auto; width: auto;">
          </div>
          <div class="control">
            <label for="overlay-alphaGamma">Alpha γ (rank curve)</label>
            <output id="overlay-alphaGamma-value">4.0</output>
            <input id="overlay-alphaGamma" type="range" min="0.5" max="6" step="0.5" value="4" data-overlay-key="alphaGamma">
          </div>
          <div class="control">
            <label for="overlay-minDrawAlpha">Min α (cull threshold)</label>
            <output id="overlay-minDrawAlpha-value">0.05</output>
            <input id="overlay-minDrawAlpha" type="range" min="0" max="0.3" step="0.01" value="0.05" data-overlay-key="minDrawAlpha">
          </div>
          <div class="control">
            <label for="overlay-widthMin">Width min (low support)</label>
            <output id="overlay-widthMin-value">1.00</output>
            <input id="overlay-widthMin" type="range" min="0.25" max="5" step="0.05" value="1" data-overlay-key="widthMin">
          </div>
          <div class="control">
            <label for="overlay-widthMax">Width max (high support)</label>
            <output id="overlay-widthMax-value">3.0</output>
            <input id="overlay-widthMax" type="range" min="0.5" max="5" step="0.5" value="3" data-overlay-key="widthMax">
          </div>
          <div class="control">
            <label for="overlay-color">Line color</label>
            <input id="overlay-color" type="color" value="#9be8ff" style="grid-column: auto; width: 60px; height: 24px; padding: 0; border: 1px solid #365866; background: transparent;">
          </div>
          <div class="control" style="grid-template-columns: 1fr auto;">
            <label for="overlay-colorByGeneration">Color by generation (debug)</label>
            <input id="overlay-colorByGeneration" type="checkbox" style="grid-column: auto; width: auto;">
          </div>
        </div>
        <div class="actions">
          <button id="overlay-reset" type="button">Reset</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/playground/ai-interwheel.ts"></script>
  </body>
</html>
